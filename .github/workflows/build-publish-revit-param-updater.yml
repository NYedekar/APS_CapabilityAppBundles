name: Build & Publish RevitParameterUpdater to APS

# Scaffolded from templates/ci/revit/build-publish.example.yml.
# Proven Revit stack: net48 + Autodesk.Revit+2026 engine.
# DesignAutomationBridge.dll must ship in Contents/ (bridge fix gate enforces this).

on:
  push:
    branches: [main, feat/revit-parameter-updater]
    paths:
      - 'src/RevitParameterUpdater/**'
      - 'bundle/RevitParameterUpdater.bundle/**'
      - 'scripts/publish-param-updater-activity.js'
      - 'scripts/smoke-test-revit-param-updater.js'
      - 'test/**'
      - '.github/workflows/build-publish-revit-param-updater.yml'
  workflow_dispatch:

concurrency:
  group: publish-revit-param-updater
  cancel-in-progress: false

env:
  ENGINE_VERSION: "2026"
  BUNDLE_NAME:    "RevitParameterUpdater"
  ACTIVITY_ID:    "UpdateRevitParameters"
  ALIAS:          "prod"

jobs:
  build-and-publish:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - uses: NuGet/setup-nuget@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore NuGet packages
        run: nuget restore src/RevitParameterUpdater/RevitParameterUpdater.csproj

      - name: Build RevitParameterUpdater.dll
        run: |
          msbuild src/RevitParameterUpdater/RevitParameterUpdater.csproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:OutputPath="${{ github.workspace }}\bundle\RevitParameterUpdater.bundle\Contents\"
        shell: pwsh

      - name: Verify bundle layout (incl. bridge + ExcelDataReader) and create zip
        run: |
          $bundle = "bundle\RevitParameterUpdater.bundle"
          Write-Host "=== Bundle contents ===" -ForegroundColor Cyan
          Get-ChildItem -Recurse $bundle | Select-Object FullName

          if (-not (Test-Path "$bundle\PackageContents.xml")) {
            Write-Error "MISSING: PackageContents.xml"; exit 1
          }
          if (-not (Test-Path "$bundle\Contents\RevitParameterUpdater.addin")) {
            Write-Error "MISSING: Contents\RevitParameterUpdater.addin"; exit 1
          }
          if (-not (Test-Path "$bundle\Contents\RevitParameterUpdater.dll")) {
            Write-Error "MISSING: Contents\RevitParameterUpdater.dll"; exit 1
          }
          if (-not (Test-Path "$bundle\Contents\Newtonsoft.Json.dll")) {
            Write-Error "MISSING: Contents\Newtonsoft.Json.dll"; exit 1
          }
          # ── BRIDGE FIX GATE ──────────────────────────────────────────────────
          # DesignAutomationBridge.dll MUST ship. If missing, the Autodesk.Forge.DesignAutomation.Revit
          # package was accidentally referenced with ExcludeAssets="runtime" — remove it.
          if (-not (Test-Path "$bundle\Contents\DesignAutomationBridge.dll")) {
            Write-Error "MISSING: Contents\DesignAutomationBridge.dll (bridge fix regressed)"; exit 1
          }
          Write-Host "✅ DesignAutomationBridge.dll present." -ForegroundColor Green
          # ── EXCELDATAREADER GATE ─────────────────────────────────────────────
          if (-not (Test-Path "$bundle\Contents\ExcelDataReader.dll")) {
            Write-Error "MISSING: Contents\ExcelDataReader.dll"; exit 1
          }
          Write-Host "✅ ExcelDataReader.dll present." -ForegroundColor Green

          Compress-Archive -Path $bundle -DestinationPath RevitParameterUpdater.zip -Force

          Write-Host "=== Zip entries ===" -ForegroundColor Cyan
          Add-Type -Assembly System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead("$PWD\RevitParameterUpdater.zip")
          $zip.Entries | Select-Object FullName | Format-Table -AutoSize
          $zip.Dispose()
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: RevitParameterUpdater-bundle
          path: RevitParameterUpdater.zip

      - name: Publish AppBundle to APS
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
          BUNDLE_NAME:       ${{ env.BUNDLE_NAME }}
          ENGINE_VERSION:    ${{ env.ENGINE_VERSION }}
          ALIAS:             ${{ env.ALIAS }}
        run: node scripts/publish-appbundle.js
        shell: bash

      - name: Publish Activity to APS
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
          BUNDLE_NAME:       ${{ env.BUNDLE_NAME }}
          ENGINE_VERSION:    ${{ env.ENGINE_VERSION }}
          ALIAS:             ${{ env.ALIAS }}
          ACTIVITY_ID:       ${{ env.ACTIVITY_ID }}
        run: node scripts/publish-param-updater-activity.js
        shell: bash

      # ── END-TO-END SMOKE GATE ───────────────────────────────────────────────
      # Submits an empty delta CSV (0 rows) + sample.rvt. The bundle must load,
      # save the model as result.rvt, and write a valid result.json with ok=true.
      - name: Smoke test (run activity on sample RVT with empty delta)
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
          ALIAS:             ${{ env.ALIAS }}
          SMOKE_ACTIVITY_ID: ${{ env.ACTIVITY_ID }}
          SAMPLE_RVT:        test/sample.rvt
        run: node scripts/smoke-test-revit-param-updater.js
        shell: bash
