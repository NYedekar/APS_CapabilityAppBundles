name: Build & Publish AppBundle to APS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'bundle/**'
      - '.github/workflows/build-and-publish.yml'
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  # Revit engine version to target
  ENGINE_VERSION: "2024"
  BUNDLE_NAME: "RevitExtractor"
  ALIAS: "prod"

jobs:
  build-and-publish:
    runs-on: windows-latest          # MUST be Windows — Revit SDK is Windows-only

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Setup .NET ──────────────────────────────────────────────────────
      - name: Setup .NET Framework build tools
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      # ── 3. Restore NuGet packages ──────────────────────────────────────────
      - name: Restore NuGet packages
        run: nuget restore src/RevitExtractor/RevitExtractor.csproj

      # ── 4. Build the plugin DLL ────────────────────────────────────────────
      - name: Build RevitExtractor.dll
        run: |
          msbuild src/RevitExtractor/RevitExtractor.csproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:OutputPath="${{ github.workspace }}\bundle\RevitExtractor.bundle\Contents\"
        shell: pwsh

      # ── 5. Verify DLL was produced ─────────────────────────────────────────
      - name: List bundle contents
        run: Get-ChildItem -Recurse bundle/
        shell: pwsh

      # ── 6. Zip the .bundle folder ──────────────────────────────────────────
      - name: Prepare and zip bundle
        run: |
          $bundle = "bundle\RevitExtractor.bundle"

          # Copy .addin to bundle root (it should already be there from Git,
          # but copy from Contents/ as fallback)
          Copy-Item "$bundle\RevitExtractor.addin" "$bundle\RevitExtractor.addin" -Force -ErrorAction SilentlyContinue

          # Show exactly what is in the bundle
          Write-Host "=== Bundle contents ==="
          Get-ChildItem -Recurse $bundle

          # Verify all required files exist
          if (-not (Test-Path "$bundle\PackageContents.xml"))  { Write-Error "Missing PackageContents.xml"; exit 1 }
          if (-not (Test-Path "$bundle\RevitExtractor.addin")) { Write-Error "Missing RevitExtractor.addin"; exit 1 }
          if (-not (Test-Path "$bundle\Contents\RevitExtractor.dll")) { Write-Error "Missing RevitExtractor.dll"; exit 1 }

          Write-Host "✅ PackageContents.xml found"
          Write-Host "✅ RevitExtractor.addin found at bundle root"
          Write-Host "✅ RevitExtractor.dll found in Contents/"

          # Zip the FOLDER (not its contents) so RevitExtractor.bundle/ is
          # inside the zip — Revit DA requires *.bundle folder in the zip root
          Compress-Archive `
            -Path $bundle `
            -DestinationPath RevitExtractor.zip `
            -Force

          # Verify zip structure
          Write-Host "=== Zip internal structure ==="
          Add-Type -Assembly System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead("$PWD\RevitExtractor.zip")
          $zip.Entries | Select-Object FullName | Format-Table
          $zip.Dispose()

          Write-Host "✅ RevitExtractor.zip created"
        shell: pwsh
          
      # ── 7. Upload the zip as a workflow artifact (useful for debugging) ────
      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: RevitExtractor-bundle
          path: RevitExtractor.zip

      # ── 8. Publish AppBundle to APS ────────────────────────────────────────
      - name: Publish AppBundle to APS
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
        run: |
          node scripts/publish-appbundle.js
        shell: bash

      # ── 9. Publish Activity definition ─────────────────────────────────────
      - name: Publish Activity to APS
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
        run: |
          node scripts/publish-activity.js
        shell: bash

      # ── 10. Summary ─────────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "✅ AppBundle '${{ env.BUNDLE_NAME }}+${{ env.ALIAS }}' published."
          echo "✅ Activity 'ExtractRevitData+${{ env.ALIAS }}' published."
          echo "   Engine  : Autodesk.Revit+${{ env.ENGINE_VERSION }}"
          echo "   Outputs : result.json + result.csv"
        shell: bash
