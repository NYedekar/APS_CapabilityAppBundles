name: Build & Publish AUDemoRevitSmoke to APS

# Generated by scripts/scaffold-bundle.js (shape based on
# templates/ci/revit/build-publish.example.yml). Publishes activities via
# scripts/publish-revit-activity.js, a generic single-activity publisher scaffolded
# alongside this workflow (templates/ci/revit/publish-pdf-activity.js is specific
# to the RevitPDFExport reference bundle's dual-activity contract).

on:
  push:
    branches: [main]
    paths:
      - 'src/AUDemoRevitSmoke/**'
      - 'bundle/AUDemoRevitSmoke.bundle/**'
      - 'scripts/**'
      - 'test/**'
      - '.github/workflows/build-publish-au-demo-revit-smoke.yml'
  workflow_dispatch:

env:
  ENGINE_VERSION: "2026"
  BUNDLE_NAME:    "AUDemoRevitSmoke"
  ACTIVITY_ID:    "AUDemoRevitSmoke"
  ALIAS:          "prod"

jobs:
  build-and-publish:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - uses: NuGet/setup-nuget@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore NuGet packages
        run: nuget restore src/AUDemoRevitSmoke/AUDemoRevitSmoke.csproj

      - name: Build AUDemoRevitSmoke.dll
        run: |
          msbuild src/AUDemoRevitSmoke/AUDemoRevitSmoke.csproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:OutputPath="${{ github.workspace }}\bundle\AUDemoRevitSmoke.bundle\Contents\"
        shell: pwsh

      - name: Verify bundle layout and create zip
        run: |
          $bundle = "bundle\AUDemoRevitSmoke.bundle"
          Write-Host "=== Bundle contents ===" -ForegroundColor Cyan
          Get-ChildItem -Recurse $bundle | Select-Object FullName

          if (-not (Test-Path "$bundle\PackageContents.xml")) { Write-Error "MISSING: PackageContents.xml"; exit 1 }
          if (-not (Test-Path "$bundle\Contents\AUDemoRevitSmoke.addin")) { Write-Error "MISSING: Contents\AUDemoRevitSmoke.addin"; exit 1 }
          if (-not (Test-Path "$bundle\Contents\AUDemoRevitSmoke.dll")) { Write-Error "MISSING: Contents\AUDemoRevitSmoke.dll"; exit 1 }
          if (-not (Test-Path "$bundle\Contents\DesignAutomationBridge.dll")) {
            Write-Error "MISSING: Contents\DesignAutomationBridge.dll (don't ExcludeAssets=runtime on Autodesk.Forge.DesignAutomation.Revit)"; exit 1
          }

          Compress-Archive -Path $bundle -DestinationPath AUDemoRevitSmoke.zip -Force

          Write-Host "=== Zip entries ===" -ForegroundColor Cyan
          Add-Type -Assembly System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead("$PWD\AUDemoRevitSmoke.zip")
          $zip.Entries | Select-Object FullName | Format-Table -AutoSize
          $zip.Dispose()
        shell: pwsh

      - name: Validate bundle (pre-flight)
        run: pwsh scripts/Validate-Bundle.ps1 -BundlePath "AUDemoRevitSmoke.zip" -Product revit
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: AUDemoRevitSmoke-bundle
          path: AUDemoRevitSmoke.zip

      - name: Publish AppBundle to APS
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
          BUNDLE_NAME:       ${{ env.BUNDLE_NAME }}
          ENGINE_VERSION:    ${{ env.ENGINE_VERSION }}
          ALIAS:             ${{ env.ALIAS }}
        run: node scripts/publish-appbundle.js
        shell: bash

      - name: Publish Activity to APS
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
          BUNDLE_NAME:       ${{ env.BUNDLE_NAME }}
          ENGINE_VERSION:    ${{ env.ENGINE_VERSION }}
          ALIAS:             ${{ env.ALIAS }}
          ACTIVITY_ID:       ${{ env.ACTIVITY_ID }}
        run: node scripts/publish-revit-activity.js
        shell: bash

      - name: Smoke test (run activity on sample RVT)
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
          ALIAS:             ${{ env.ALIAS }}
          SMOKE_ACTIVITY_ID: ${{ env.ACTIVITY_ID }}
        run: node scripts/smoke-test-au-demo-revit-smoke.js
        shell: bash
