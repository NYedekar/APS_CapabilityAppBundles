name: Build & Publish AutoCADTitleBlockUpdater to APS

# Generated by scripts/scaffold-bundle.js (shape based on
# templates/ci/autocad/build-publish.example.yml). Edit the env: block, or add
# another "Publish Activity" step for a second verb, as needed.

on:
  push:
    branches: [main]
    paths:
      - 'src/AutoCADTitleBlockUpdater/**'
      - 'bundle/AutoCADTitleBlockUpdater.bundle/**'
      - 'scripts/publish-autocad-appbundle.js'
      - 'scripts/publish-titleblock-activity.js'
      - 'scripts/smoke-test-titleblock.js'
      - 'scripts/Validate-Bundle.ps1'
      - 'test/**'
      - '.github/workflows/build-publish-auto-cad-title-block-updater.yml'
  workflow_dispatch:
concurrency:
  group: publish-auto-cad-title-block-updater
  cancel-in-progress: false
env:
  ENGINE_VERSION: "24_3"   # Autodesk.AutoCAD+24_3. Keep pinned to a smoke-gate-green engine (see SKILL.md "the one rule that overrides everything").
  BUNDLE_NAME: "AutoCADTitleBlockUpdater"
  ACTIVITY_ID: "UpdateTitleBlock"
  ALIAS:       "prod"

jobs:
  build-and-publish:
    runs-on: windows-latest  # AutoCAD .NET SDK requires Windows

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'   # SDK only drives dotnet publish of the net48 project; the DA engine is +24_3 / .NET Framework 4.8.

      - name: Build AutoCADTitleBlockUpdater.dll
        run: |
          dotnet publish src/AutoCADTitleBlockUpdater/AutoCADTitleBlockUpdater.csproj `
            --configuration Release `
            --output "${{ github.workspace }}\bundle\AutoCADTitleBlockUpdater.bundle\Contents\"
        shell: pwsh

      - name: Verify bundle structure
        run: |
          $bundle = "bundle\AutoCADTitleBlockUpdater.bundle"
          Write-Host "=== Bundle contents ==="
          Get-ChildItem -Recurse $bundle | Select-Object FullName | Format-Table

          $checks = @(
            "$bundle\PackageContents.xml",
            "$bundle\Contents\AutoCADTitleBlockUpdater.dll",
            "$bundle\Contents\Newtonsoft.Json.dll"
          )
          foreach ($f in $checks) {
            if (-not (Test-Path $f)) { Write-Error "Missing: $f"; exit 1 }
            Write-Host "OK: $f"
          }
        shell: pwsh

      - name: Zip bundle
        run: |
          $bundle = "bundle\AutoCADTitleBlockUpdater.bundle"
          $zipName = "${{ env.BUNDLE_NAME }}.zip"
          Compress-Archive -Path $bundle -DestinationPath $zipName -Force

          Write-Host "=== Zip internal structure ==="
          Add-Type -Assembly System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead("$PWD\$zipName")
          $zip.Entries | Select-Object FullName | Format-Table
          $zip.Dispose()
        shell: pwsh

      - name: Validate bundle (pre-flight)
        run: pwsh scripts/Validate-Bundle.ps1 -BundlePath "${{ env.BUNDLE_NAME }}.zip" -Product autocad
        shell: pwsh

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoCADTitleBlockUpdater-bundle
          path: AutoCADTitleBlockUpdater.zip

      - name: Publish AppBundle
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
        run: node scripts/publish-autocad-appbundle.js
        shell: bash

      - name: Publish Activity (UpdateTitleBlock — write-back, two modes)
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
          ENGINE_VERSION:    ${{ env.ENGINE_VERSION }}
          ACTIVITY_ID:       ${{ env.ACTIVITY_ID }}
          COMMAND:           APSTITLEBLOCK
        run: node scripts/publish-titleblock-activity.js
        shell: bash

      - name: Smoke test (extract probe + update on a title-block DWG)
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
          SMOKE_ACTIVITY_ID: ${{ env.ACTIVITY_ID }}
          # Probe order: first candidate with an attributed title block wins.
          # titleblock-sample.dwg is the known-good fixture (paper-space layout
          # "SECTIONS AND DETAILS" → "Rev" block → editable "REV" tag).
          SMOKE_SAMPLE_DWGS: test/titleblock-sample.dwg,test/sample.dwg
        run: node scripts/smoke-test-titleblock.js
        shell: bash

      - name: Summary
        run: |
          echo "AppBundle '${{ env.BUNDLE_NAME }}+${{ env.ALIAS }}' published."
          echo "Activity '${{ env.ACTIVITY_ID }}+${{ env.ALIAS }}' published."
          echo "Engine  : Autodesk.AutoCAD+${{ env.ENGINE_VERSION }}"
          echo "Command : APSTITLEBLOCK (self-selects extract vs update)"
          echo "Get     : inputFile (req), params (opt), changesFile (opt)"
          echo "Put     : result.dwg (update), result.json (both)"
        shell: bash
