name: Build & Publish Inventor BOM Extractor

on:
  push:
    branches: [main]
    paths:
      - 'src/InventorBOMExtractor/**'
      - 'bundle/InventorBOMExtractor.bundle/**'
      - 'lib/Inventor/**'
      - 'scripts/publish-inventor-appbundle.js'
      - 'scripts/publish-inventor-activity.js'
      - 'scripts/smoke-test-inventor.js'
      - 'test/inventor/**'
      - '.github/workflows/build-publish-inventor-bom-extractor.yml'
  workflow_dispatch:

concurrency:
  group: publish-inventor-bom-extractor
  cancel-in-progress: false

env:
  BUNDLE_NAME:        "InventorBOMExtractor"
  ACTIVITY_ID:        "ExtractInventorBOM"
  ALIAS:              "prod"
  ENGINE_VERSION:     "2025"

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      # Compile the minimal Inventor interop IL assembly.
      # This produces Inventor.Interop.dll which the csproj embeds via EmbedInteropTypes=True.
      # The 'import' keyword in the IL sets tdComImport, enabling CLR type-equivalence and
      # correct CCW QI support — without this, Inventor returns E_NOINTERFACE on the plugin.
      - name: Compile Inventor interop IL
        shell: pwsh
        run: |
          $ilasm = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\ilasm.exe"
          & $ilasm /dll /quiet /output:"src\InventorBOMExtractor\Inventor.Interop.dll" "lib\Inventor\Inventor.Interop.il"
          if ($LASTEXITCODE -ne 0) { Write-Error "ilasm failed"; exit 1 }
          Write-Host "✅ Inventor.Interop.dll compiled"

      - name: Build InventorBOMExtractor.dll
        run: |
          dotnet publish src/InventorBOMExtractor/InventorBOMExtractor.csproj `
            --configuration Release `
            --output "${{ github.workspace }}\bundle\InventorBOMExtractor.bundle\Contents\"
        shell: pwsh

      - name: Verify bundle structure
        run: |
          $bundle = "bundle\InventorBOMExtractor.bundle"
          Write-Host "=== Bundle contents ==="
          Get-ChildItem -Recurse $bundle | Select-Object FullName | Format-Table
          $checks = @(
            "$bundle\PackageContents.xml",
            "$bundle\Contents\InventorBOMExtractor.dll",
            "$bundle\Contents\Newtonsoft.Json.dll",
            "$bundle\Contents\InventorBOMExtractor.Inventor.addin"
          )
          foreach ($f in $checks) {
            if (-not (Test-Path $f)) { Write-Error "Missing: $f"; exit 1 }
            Write-Host "✅ $f"
          }
        shell: pwsh

      - name: Zip bundle
        run: |
          $bundle  = "bundle\InventorBOMExtractor.bundle"
          $zipName = "${{ env.BUNDLE_NAME }}.zip"
          Compress-Archive -Path $bundle -DestinationPath $zipName -Force
          Write-Host "=== Zip internal structure ==="
          Add-Type -Assembly System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead("$PWD\$zipName")
          $zip.Entries | Select-Object FullName | Format-Table
          $zip.Dispose()
          Write-Host "✅ $zipName created"
        shell: pwsh

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: InventorBOMExtractor-bundle
          path: InventorBOMExtractor.zip

      - name: Publish AppBundle
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
          ENGINE_VERSION:    ${{ env.ENGINE_VERSION }}
        run: node scripts/publish-inventor-appbundle.js
        shell: bash

      - name: Publish Activity (ExtractInventorBOM)
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
          ACTIVITY_ID:       ExtractInventorBOM
        run: node scripts/publish-inventor-activity.js
        shell: bash

      - name: Smoke test
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
          SMOKE_ACTIVITY_ID: ExtractInventorBOM
        run: node scripts/smoke-test-inventor.js
        shell: bash

      - name: Summary
        run: |
          echo "✅ AppBundle '${{ env.BUNDLE_NAME }}+${{ env.ALIAS }}' published."
          echo "✅ Activity 'ExtractInventorBOM+${{ env.ALIAS }}' published."
          echo "✅ Smoke test passed."
        shell: bash
