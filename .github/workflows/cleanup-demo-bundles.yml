# One-off, manually-triggered cleanup of throwaway AUDemo* appbundles/activities.
# Delete this workflow + scripts/cleanup-demo-bundles.js after it has run.
name: Cleanup demo bundles

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Delete AUDemo* appbundles and activities
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          DELETE_IDS:        'AUDemoAcadSmoke,AUDemoRevitCheck,AUDemoInvCheck'
        run: node tools/cleanup-demo-bundles.js
