name: Build & Publish AUDemoAcadSmoke to APS

# Generated by scripts/scaffold-bundle.js (shape based on
# templates/ci/autocad/build-publish.example.yml). Edit the env: block, or add
# another "Publish Activity" step for a second verb, as needed.

on:
  push:
    branches: [main]
    paths:
      - 'src/AUDemoAcadSmoke/**'
      - 'bundle/AUDemoAcadSmoke.bundle/**'
      - 'scripts/**'
      - 'test/**'
      - '.github/workflows/build-publish-au-demo-acad-smoke.yml'
  workflow_dispatch:
concurrency:
  group: publish-au-demo-acad-smoke
  cancel-in-progress: false
env:
  ENGINE_VERSION: "24_3"   # Autodesk.AutoCAD+24_3. Keep pinned to a smoke-gate-green engine (see SKILL.md "the one rule that overrides everything").
  BUNDLE_NAME: "AUDemoAcadSmoke"
  ACTIVITY_ID: "AUDemoAcadSmoke"
  ALIAS:       "prod"

jobs:
  build-and-publish:
    runs-on: windows-latest  # AutoCAD .NET SDK requires Windows

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'   # SDK only drives dotnet publish of the net48 project; the DA engine is +24_3 / .NET Framework 4.8.

      - name: Build AUDemoAcadSmoke.dll
        run: |
          dotnet publish src/AUDemoAcadSmoke/AUDemoAcadSmoke.csproj `
            --configuration Release `
            --output "${{ github.workspace }}\bundle\AUDemoAcadSmoke.bundle\Contents\"
        shell: pwsh

      - name: Verify bundle structure
        run: |
          $bundle = "bundle\AUDemoAcadSmoke.bundle"
          Write-Host "=== Bundle contents ==="
          Get-ChildItem -Recurse $bundle | Select-Object FullName | Format-Table

          $checks = @(
            "$bundle\PackageContents.xml",
            "$bundle\Contents\AUDemoAcadSmoke.dll",
            "$bundle\Contents\Newtonsoft.Json.dll"
          )
          foreach ($f in $checks) {
            if (-not (Test-Path $f)) { Write-Error "Missing: $f"; exit 1 }
            Write-Host "OK: $f"
          }
        shell: pwsh

      - name: Zip bundle
        run: |
          $bundle = "bundle\AUDemoAcadSmoke.bundle"
          $zipName = "${{ env.BUNDLE_NAME }}.zip"
          Compress-Archive -Path $bundle -DestinationPath $zipName -Force

          Write-Host "=== Zip internal structure ==="
          Add-Type -Assembly System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead("$PWD\$zipName")
          $zip.Entries | Select-Object FullName | Format-Table
          $zip.Dispose()
        shell: pwsh

      - name: Validate bundle (pre-flight)
        run: pwsh scripts/Validate-Bundle.ps1 -BundlePath "${{ env.BUNDLE_NAME }}.zip" -Product autocad
        shell: pwsh

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: AUDemoAcadSmoke-bundle
          path: AUDemoAcadSmoke.zip

      - name: Publish AppBundle
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
        run: node scripts/publish-autocad-appbundle.js
        shell: bash

      - name: Publish Activity
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
          ACTIVITY_ID:       ${{ env.ACTIVITY_ID }}
          COMMAND:           APSAUDEMOACAD
        run: node scripts/publish-autocad-activity.js
        shell: bash

      - name: Smoke test (run activity on sample DWG)
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
          SMOKE_ACTIVITY_ID: ${{ env.ACTIVITY_ID }}
        run: node scripts/smoke-test-activity.js
        shell: bash

      - name: Summary
        run: |
          echo "AppBundle '${{ env.BUNDLE_NAME }}+${{ env.ALIAS }}' published."
          echo "Activity '${{ env.ACTIVITY_ID }}+${{ env.ALIAS }}' published."
          echo "Engine  : Autodesk.AutoCAD+${{ env.ENGINE_VERSION }}"
          echo "Command : APSAUDEMOACAD"
          echo "Output  : result.json"
        shell: bash
