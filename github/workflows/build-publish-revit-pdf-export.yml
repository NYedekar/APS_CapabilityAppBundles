name: Build & Publish RevitPDFExport to APS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'bundle/**'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  ENGINE_VERSION:  "2026"
  BUNDLE_NAME:     "RevitPDFExport"
  ALIAS:           "prod"
  ACTIVITY_SHEETS: "ExportSheetsToPDF"
  ACTIVITY_VIEWS:  "ExportViewsToPDF"

jobs:
  build-and-publish:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - uses: NuGet/setup-nuget@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore NuGet packages
        run: nuget restore src/RevitPDFExport/RevitPDFExport.csproj

      - name: Build RevitPDFExport.dll
        run: |
          msbuild src/RevitPDFExport/RevitPDFExport.csproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:OutputPath="${{ github.workspace }}\bundle\RevitPDFExport.bundle\Contents\"
        shell: pwsh

      - name: Verify bundle layout and create zip
        run: |
          $bundle = "bundle\RevitPDFExport.bundle"
          Write-Host "=== Bundle contents ===" -ForegroundColor Cyan
          Get-ChildItem -Recurse $bundle | Select-Object FullName

          if (-not (Test-Path "$bundle\PackageContents.xml")) {
            Write-Error "MISSING: PackageContents.xml"; exit 1
          }
          if (-not (Test-Path "$bundle\Contents\RevitPDFExport.addin")) {
            Write-Error "MISSING: Contents\RevitPDFExport.addin"; exit 1
          }
          if (-not (Test-Path "$bundle\Contents\RevitPDFExport.dll")) {
            Write-Error "MISSING: Contents\RevitPDFExport.dll"; exit 1
          }

          Compress-Archive -Path $bundle -DestinationPath RevitPDFExport.zip -Force

          Write-Host "=== Zip entries ===" -ForegroundColor Cyan
          Add-Type -Assembly System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead("$PWD\RevitPDFExport.zip")
          $zip.Entries | Select-Object FullName | Format-Table -AutoSize
          $zip.Dispose()
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: RevitPDFExport-bundle
          path: RevitPDFExport.zip

      - name: Publish AppBundle to APS
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
          BUNDLE_NAME:       ${{ env.BUNDLE_NAME }}
          ENGINE_VERSION:    ${{ env.ENGINE_VERSION }}
          ALIAS:             ${{ env.ALIAS }}
        run: node scripts/publish-appbundle.js
        shell: bash

      - name: Publish Activities to APS
        env:
          APS_CLIENT_ID:     ${{ secrets.APS_CLIENT_ID }}
          APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
          APS_NICKNAME:      ${{ secrets.APS_NICKNAME }}
          BUNDLE_NAME:       ${{ env.BUNDLE_NAME }}
          ENGINE_VERSION:    ${{ env.ENGINE_VERSION }}
          ALIAS:             ${{ env.ALIAS }}
          ACTIVITY_SHEETS:   ${{ env.ACTIVITY_SHEETS }}
          ACTIVITY_VIEWS:    ${{ env.ACTIVITY_VIEWS }}
        run: node scripts/publish-pdf-activity.js
        shell: bash
